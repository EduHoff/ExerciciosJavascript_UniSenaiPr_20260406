<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercício 8</title>
</head>
<!--
O programa sorteia um número de 1 a 10. O usuário digita palpites até acertar.
A cada tentativa, mostre se o número secreto é maior ou menor. Ao acertar,
mostre o total de tentativas.
-->
<body>
    <div class="container">
        <h1>Exercício 8</h1>
        
        <div class="input-group">
            <label for="num">Palpite do número sorteado:</label>
            <input type="number" id="num" min="1" max="10" step="1" placeholder="Digite um número">
        </div>

        <button id="bntResultado">Adivinhar</button>

        <div id="resultado" class="resultado"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
