<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercício 3</title>
</head>
<!--
Peça o peso (kg) e a altura (m) e exiba o IMC calculado. Fórmula: IMC = peso /
(altura²)
-->
<body>
    <div class="container">
        <h1>Exercício 3</h1>
        
        <div class="input-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" placeholder="Digite o peso (kg)">
        </div>

        <div class="input-group">
            <label for="altura">Altura (m):</label>
            <input type="number" id="altura" placeholder="Digite a altura (m)">
        </div>

        <button id="bntResultado">Calcular</button>

        <div id="resultado" class="resultado"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
