<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercício 7</title>

<!--
Receba um número e exiba sua tabuada completa de 1 a 10 usando for.
-->
<body>
    <div class="container">
        <h1>Exercício 7</h1>
        
        <div class="input-group">
            <label for="num">Número para calcular tabuada:</label>
            <input type="number" id="num" placeholder="Digite um número">
        </div>

        <button id="bntResultado">Calcular</button>

        <div id="resultado" class="resultado"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
