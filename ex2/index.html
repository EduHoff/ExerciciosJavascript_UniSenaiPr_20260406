<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercício 2</title>
</head>
<!--
Receba uma temperatura em Celsius e mostre na página o equivalente em
Fahrenheit e Kelvin. Fórmulas: F = C × 1.8 + 32 e K = C + 273.15.
-->
<body>
    <div class="container">
        <h1>Exercício 2</h1>
        
        <div class="input-group">
            <label for="celsius">Graus Celsius:</label>
            <input type="number" id="celsius" placeholder="Digite um valor">
        </div>

        <button id="bntResultado">Calcular</button>

        <div id="resultadoF" class="resultado"></div>
        <div id="resultadoK" class="resultado"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
