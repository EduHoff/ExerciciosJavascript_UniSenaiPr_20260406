<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercício 6</title>
</head>
<!--
Digite um número de 1 a 7 e use switch para exibir o nome do dia da semana
correspondente. Trate o caso de número inválido.
-->
<body>
    <div class="container">
        <h1>Exercício 6</h1>
        
        <div class="input-group">
            <label for="opcao">Dia da semana:</label>
            <input type="number" min="1" max="7" step="1" id="opcao" placeholder="Digite um número inteiro entre 1 e 7">
        </div>

        <button id="bntResultado">Calcular</button>

        <div id="resultado" class="resultado"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
